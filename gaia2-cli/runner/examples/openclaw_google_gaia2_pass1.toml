# OpenClaw + Google AI Studio Gemini 3.1 Pro Preview, pass@1 on the public
# HuggingFace dataset.

[target]
dataset = "meta-agents-research-environments/gaia2-cli"
splits = "all"

[agent]
image = "localhost/gaia2-oc:latest"
provider = "google"
model = "gemini-3.1-pro-preview"
api_key_env = "GOOGLE_API_KEY"
thinking = "high"

[judge]
provider = "anthropic"
model = "claude-sonnet-4-6"
api_key_env = "ANTHROPIC_API_KEY"

[run]
timeout = 900
health_timeout = 180
concurrency = 20
pass_at = 1
output_dir = "/tmp/gaia2_openclaw_google_pass1"
log_level = "INFO"
