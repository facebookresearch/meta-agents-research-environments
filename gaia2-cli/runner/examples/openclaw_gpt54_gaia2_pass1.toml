# OpenClaw + direct OpenAI GPT-5.4, pass@1 on the public HuggingFace dataset.

[target]
dataset = "meta-agents-research-environments/gaia2-cli"
splits = "all"

[agent]
image = "localhost/gaia2-oc:latest"
provider = "openai"
model = "gpt-5.4"
api_key_env = "OPENAI_API_KEY"
thinking = "high"

[judge]
provider = "anthropic"
model = "claude-sonnet-4-6"
api_key_env = "ANTHROPIC_API_KEY"

[run]
timeout = 900
health_timeout = 180
concurrency = 20
pass_at = 1
output_dir = "/tmp/gaia2_openclaw_gpt54_pass1"
log_level = "INFO"
